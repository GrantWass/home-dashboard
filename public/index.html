<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Status Bar: date | clock | setup -->
  <header class="status-bar">
    <span class="status-date" id="dateDisplay"></span>
    <span class="status-clock" id="clock"></span>
    <div class="status-right">
      <button class="setup-btn" id="btnSetup" title="Setup">⚙</button>
    </div>
  </header>

  <!-- Full-width Weather Bar -->
  <div class="weather-bar" id="weatherBar">
    <div class="loading-msg">Loading weather...</div>
  </div>

  <!-- hidden strava status for JS -->
  <span id="stravaStatus" style="display:none"></span>

  <!-- Main Grid -->
  <main class="dashboard-grid">

    <!-- Left: full-height photo -->
    <div class="left-col">
      <div class="photo-panel">
        <div class="photo-slideshow" id="photoSlideshow">
          <div class="photo-placeholder">
            <p>No photos yet.</p>
            <p class="photo-placeholder-sub">Upload from your phone →</p>
          </div>
        </div>
        <div class="photo-counter-overlay" id="photoCounter" style="display:none"></div>
      </div>
    </div>

    <!-- Right: Activities + Leaderboard -->
    <div class="right-col">

      <div class="activities-section">
        <div class="athlete-grid" id="activityGrid">
          <div class="loading-msg" style="grid-column:1/-1">Loading activities...</div>
        </div>
      </div>

      <div class="leaderboard-section">
        <div class="leaderboard-compact" id="leaderboardCompact">
          <div class="loading-msg">Loading...</div>
        </div>
      </div>

    </div>
  </main>

  <!-- Notes Ribbon -->
  <div class="notes-ribbon">
    <span class="ribbon-icon">📝</span>
    <div class="ribbon-track" id="notesRibbon">
      <span class="ribbon-text" id="notesText">Loading notes...</span>
    </div>
  </div>

  <!-- QR Widget -->
  <div class="qr-widget">
    <div class="qr-box" id="qrBox"></div>
    <div class="qr-label">Edit from phone</div>
  </div>

  <!-- Setup Modal -->
  <div class="modal-backdrop" id="setupModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>Dashboard Setup</h2>
        <button class="btn-icon modal-close" id="btnCloseModal">✕</button>
      </div>
      <div class="modal-body">
        <h3>Mobile Companion</h3>
        <p>Scan the QR code or visit:</p>
        <div id="mobileUrl" style="margin:10px 0;padding:10px 14px;background:var(--surface2);border-radius:8px;font-family:monospace;font-size:.9rem;color:var(--accent2)"></div>
        <hr />
        <h3>Strava Athletes</h3>
        <p>Each athlete must authorize the app once. Visit these links in any browser:</p>
        <div id="authLinks"></div>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
